<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍🍳 Waiter Dashboard - King Weliyano</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .notif-bell {
            position: relative;
            display: inline-block;
            cursor: pointer;
            font-size: 1.5rem;
            margin-right: 15px;
        }
        .notif-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .notif-dropdown {
            display: none;
            position: fixed;
            right: 20px;
            top: 80px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            width: 350px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            padding: 10px;
        }
        .notif-dropdown.show { display: block; }
        .notif-item { padding: 10px; border-bottom: 1px solid #ecf0f1; }
        .notif-item.unread { background: #fdf2f2; }
        .notif-item .time { font-size: 0.7rem; color: #7f8c8d; }
        .btn-receipt {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.3s;
        }
        .btn-receipt:hover { background: #1a252f; }
        .waiter-badge {
            background: #27ae60;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .notif-dropdown { width: 300px; right: 10px; top: 120px; }
        }
        @media (max-width: 480px) {
            .notif-dropdown { width: 280px; right: 5px; top: 110px; }
        }
    </style>
</head>
<body>

    <script>
        // ============================================================
        // AUTH CHECK
        // ============================================================
        const token = localStorage.getItem('authToken');
        if (!token) window.location.href = 'login.html';

        async function verifyAuth() {
            try {
                const res = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const result = await res.json();
                if (!result.success) {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                }
            } catch (e) {
                window.location.href = 'login.html';
            }
        }
        verifyAuth();

        function logout() {
            const token = localStorage.getItem('authToken');
            if (token) {
                fetch('/api/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
            }
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.role !== 'waiter' && user.role !== 'admin') {
            alert('Access denied. Waiters only.');
            window.location.href = 'login.html';
        }

        // ============================================================
        // GET WAITER NAME
        // ============================================================
        function getWaiterName() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            return user.username || 'Waiter';
        }

        // ============================================================
        // PRINT RECEIPT WITH WAITER NAME
        // ============================================================
        async function printReceipt(orderId) {
            try {
                const res = await fetch(`/api/orders/${orderId}`);
                const order = await res.json();

                if (!order) {
                    alert('Order not found!');
                    return;
                }

                const waiterName = getWaiterName();

                const receiptHTML = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Receipt #${order.id}</title>
                        <style>
                            body { font-family: 'Courier New', monospace; padding: 20px; max-width: 400px; margin: 0 auto; background: white; }
                            .receipt { border: 2px dashed #333; padding: 20px; }
                            .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
                            .header h1 { margin: 0; font-size: 1.5rem; color: #c0392b; }
                            .header p { margin: 5px 0; font-size: 0.9rem; color: #555; }
                            .order-info { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 5px; }
                            .items { width: 100%; margin: 10px 0; }
                            .items th { text-align: left; border-bottom: 1px solid #ddd; padding: 5px 0; }
                            .items td { padding: 5px 0; border-bottom: 1px solid #eee; }
                            .total { font-size: 1.2rem; font-weight: bold; text-align: right; border-top: 2px solid #333; padding-top: 10px; margin-top: 10px; }
                            .payment { text-align: center; margin: 10px 0; padding: 5px; background: #e8f8f0; border-radius: 5px; }
                            .served-by { text-align: center; margin: 10px 0; padding: 8px; background: #d4edda; border-radius: 5px; font-weight: bold; font-size: 1rem; border: 1px solid #27ae60; }
                            .served-by .waiter-icon { font-size: 1.2rem; }
                            .footer { text-align: center; margin-top: 20px; padding-top: 10px; border-top: 2px dashed #333; font-size: 0.8rem; color: #777; }
                            .thank-you { text-align: center; font-size: 1.2rem; font-weight: bold; color: #27ae60; margin: 10px 0; }
                            @media print { body { padding: 0; } .receipt { border: none; } .no-print { display: none; } }
                        </style>
                    </head>
                    <body>
                        <div class="receipt">
                            <div class="header">
                                <h1>🍽️ King Weliyano</h1>
                                <p>Restaurant</p>
                                <p>📍 Nairobi, Kenya</p>
                                <p>📞 +254 700 000 000</p>
                            </div>
                            <div class="order-info">
                                <p><strong>Order #:</strong> ${order.id}</p>
                                <p><strong>Date:</strong> ${new Date(order.timestamp).toLocaleString()}</p>
                                <p><strong>Table:</strong> ${order.tableNumber || 'N/A'}</p>
                                <p><strong>Customer:</strong> ${order.customerName}</p>
                                <p><strong>Phone:</strong> ${order.phone}</p>
                            </div>
                            <table class="items">
                                <tr><th>Item</th><th>Qty</th><th style="text-align:right;">Price</th></tr>
                                ${order.items.map(item => `
                                    <tr><td>${item.image || '🍽️'} ${item.name}</td><td>${item.quantity}</td><td style="text-align:right;">$${(item.price * item.quantity).toFixed(2)}</td></tr>
                                `).join('')}
                            </table>
                            <div class="total">Total: $${order.total.toFixed(2)}</div>
                            <div class="payment">💳 Payment: <strong>${order.paymentMethod || 'cash'}</strong></div>
                            <div class="served-by">
                                <span class="waiter-icon">👨‍🍳</span> Served by: <strong>${order.servedBy || waiterName}</strong>
                                ${order.servedAt ? ` at ${new Date(order.servedAt).toLocaleString()}` : ''}
                            </div>
                            ${order.specialInstructions ? `<div style="margin:10px 0;padding:10px;background:#fff3cd;border-radius:5px;"><strong>📌 Special Instructions:</strong><p style="margin:5px 0;">${order.specialInstructions}</p></div>` : ''}
                            <div class="thank-you">🙏 Thank You!</div>
                            <div class="footer"><p>🎉 Enjoy your meal!</p><p>Please come again!</p></div>
                        </div>
                        <div style="text-align:center;margin-top:20px;" class="no-print">
                            <button onclick="window.print()" style="background:#c0392b;color:white;border:none;padding:12px 30px;border-radius:25px;cursor:pointer;font-size:1rem;">🖨️ Print</button>
                            <button onclick="window.close()" style="background:#7f8c8d;color:white;border:none;padding:12px 30px;border-radius:25px;cursor:pointer;font-size:1rem;margin-left:10px;">✕ Close</button>
                        </div>
                    </body>
                    </html>
                `;

                const receiptWindow = window.open('', '_blank', 'width=450,height=600');
                receiptWindow.document.write(receiptHTML);
                receiptWindow.document.close();

            } catch (error) {
                console.error('Error generating receipt:', error);
                alert('Error generating receipt. Please try again.');
            }
        }
    </script>

    <header>
        <div class="header-content">
            <h1>👨‍🍳 King Weliyano - Waiter Dashboard</h1>
            <nav>
                <a href="index.html">🏠 Home</a>
                <a href="waiter.html">👨‍🍳 Waiter</a>
                <a href="chef.html">👨‍🍳 Chef</a>
                <a href="admin.html">👑 Admin</a>
                <span class="notif-bell" onclick="toggleWaiterNotif()">
                    🔔
                    <span class="notif-badge" id="waiterNotifCount">0</span>
                </span>
                <a href="#" onclick="logout()">🚪 Logout</a>
            </nav>
        </div>
    </header>

    <div class="container">

        <!-- Welcome Message with Waiter Name -->
        <div style="background: #e8f8f0; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #27ae60;">
            <h3 style="margin:0; color: #2c3e50;">
                👋 Welcome, <span style="color: #27ae60; font-weight: bold;">@<span id="waiterDisplayName"></span></span>!
                <span style="font-size: 0.9rem; font-weight: normal; color: #7f8c8d; margin-left: 10px;">
                    🧾 Your name will appear on receipts when you serve orders.
                </span>
            </h3>
        </div>

        <!-- Notification Dropdown -->
        <div class="notif-dropdown" id="waiterNotifDropdown">
            <div id="waiterNotifList"></div>
        </div>

        <div class="dashboard-header">
            <h2>📋 All Orders</h2>
            <div class="filter-buttons">
                <button onclick="loadOrders('all')" class="btn-filter active">📋 All</button>
                <button onclick="loadOrders('pending')" class="btn-filter">⏳ Pending</button>
                <button onclick="loadOrders('preparing')" class="btn-filter">🔪 Preparing</button>
                <button onclick="loadOrders('ready')" class="btn-filter">✅ Ready</button>
                <button onclick="loadOrders('served')" class="btn-filter">🍽️ Served</button>
            </div>
        </div>
        <div id="orders-container"></div>
    </div>

    <footer>
        <p>© 2024 King Weliyano Restaurant. All rights reserved.</p>
    </footer>

    <script>
        // ============================================================
        // DISPLAY WAITER NAME
        // ============================================================
        document.getElementById('waiterDisplayName').textContent = getWaiterName();

        // ============================================================
        // WAITER NOTIFICATIONS
        // ============================================================
        let waiterNotifications = [];

        async function loadWaiterNotifications() {
            try {
                const res = await fetch('/api/notifications?role=waiter');
                waiterNotifications = await res.json();
                updateWaiterNotifUI();
            } catch (e) { console.error('Notif error:', e); }
        }

        function updateWaiterNotifUI() {
            const unread = waiterNotifications.filter(n => !n.read).length;
            document.getElementById('waiterNotifCount').textContent = unread;

            const list = document.getElementById('waiterNotifList');
            if (waiterNotifications.length === 0) {
                list.innerHTML = '<p style="color:#7f8c8d;text-align:center;padding:10px;">No notifications</p>';
                return;
            }
            list.innerHTML = waiterNotifications.map(n => `
                <div class="notif-item ${n.read ? '' : 'unread'}">
                    <p style="margin:0;font-size:0.9rem;">${n.message}</p>
                    <span class="time">${new Date(n.timestamp).toLocaleString()}</span>
                </div>
            `).join('');
        }

        function toggleWaiterNotif() {
            const dd = document.getElementById('waiterNotifDropdown');
            dd.classList.toggle('show');
            if (dd.classList.contains('show')) loadWaiterNotifications();
        }

        document.addEventListener('click', function(e) {
            const dd = document.getElementById('waiterNotifDropdown');
            const bell = document.querySelector('.notif-bell');
            if (bell && !bell.contains(e.target) && !dd.contains(e.target)) {
                dd.classList.remove('show');
            }
        });

        // ============================================================
        // ORDERS
        // ============================================================
        let currentStatus = 'all';

        async function loadOrders(status = 'all') {
            currentStatus = status;
            const url = status === 'all' ? '/api/orders' : `/api/orders?status=${status}`;
            try {
                const res = await fetch(url);
                const orders = await res.json();
                displayOrders(orders);
            } catch (e) { console.error('Error loading orders:', e); }
        }

        function displayOrders(orders) {
            const container = document.getElementById('orders-container');
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>📭 No orders found</h2>
                        <p>Orders will appear here when customers place them.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="order-card status-${order.status}">
                    <div class="order-header">
                        <div>
                            <strong>Order #${order.id}</strong>
                            <span class="status-badge ${order.status}">${order.status}</span>
                            ${order.servedBy ? `<span class="waiter-badge">👨‍🍳 ${order.servedBy}</span>` : ''}
                        </div>
                        <span>${new Date(order.timestamp).toLocaleString()}</span>
                    </div>
                    <div class="order-body">
                        <p><strong>👤 Customer:</strong> ${order.customerName}</p>
                        <p><strong>📞 Phone:</strong> ${order.phone}</p>
                        <p><strong>🪑 Table:</strong> ${order.tableNumber || 'N/A'}</p>
                        <p><strong>💳 Payment:</strong> ${order.paymentMethod || 'cash'}</p>
                        ${order.servedBy ? `<p><strong>👨‍🍳 Served by:</strong> ${order.servedBy}</p>` : ''}
                        <p><strong>📝 Items:</strong></p>
                        <ul>
                            ${order.items.map(item => `
                                <li>${item.image || '🍽️'} ${item.name} x${item.quantity} - $${(item.price * item.quantity).toFixed(2)}</li>
                            `).join('')}
                        </ul>
                        ${order.specialInstructions ? `<p><strong>📌 Instructions:</strong> ${order.specialInstructions}</p>` : ''}
                        <p class="order-total"><strong>Total: $${order.total.toFixed(2)}</strong></p>
                    </div>
                    <div class="order-actions">
                        ${order.status === 'ready' ? `
                            <button onclick="updateOrder(${order.id}, 'served')" class="btn-served">
                                🍽️ Mark as Served
                            </button>
                        ` : ''}
                        ${order.status === 'pending' ? `
                            <span style="color:#f39c12;font-weight:bold;">⏳ Waiting for chef</span>
                        ` : ''}
                        ${order.status === 'preparing' ? `
                            <span style="color:#3498db;font-weight:bold;">🔪 Chef is cooking</span>
                        ` : ''}
                        ${order.status === 'served' ? `
                            <span style="color:#9b59b6;font-weight:bold;">✅ Served by ${order.servedBy || 'Waiter'}</span>
                        ` : ''}
                        <button onclick="printReceipt(${order.id})" class="btn-receipt">🧾 Receipt</button>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`.btn-filter[onclick*="${currentStatus}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        // ============================================================
        // UPDATE ORDER - Pass Waiter Name
        // ============================================================
        async function updateOrder(id, status) {
            try {
                const waiterName = getWaiterName();
                
                const res = await fetch(`/api/orders/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        status: status,
                        waiterName: waiterName 
                    })
                });
                const result = await res.json();
                if (result.success) {
                    loadOrders(currentStatus);
                    loadWaiterNotifications();
                }
            } catch (e) {
                console.error('Error updating order:', e);
                alert('Error updating order. Please try again.');
            }
        }

        // ============================================================
        // AUTO-REFRESH
        // ============================================================
        setInterval(() => {
            loadOrders(currentStatus);
            loadWaiterNotifications();
        }, 5000);

        loadOrders('all');
        loadWaiterNotifications();
    </script>
</body>
</html>
