<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍🍳 Waiter Dashboard - King Weliyano</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>👨‍🍳 King Weliyano - Waiter Dashboard</h1>
            <nav>
                <a href="index.html">🏠 Home</a>
                <a href="waiter.html">👨‍🍳 Waiter</a>
                <a href="chef.html">👨‍🍳 Chef</a>
                <a href="admin.html">👑 Admin</a>
            </nav>
        </div>
    </header>
    <div class="container">
        <div class="dashboard-header">
            <h2>📋 All Orders</h2>
            <div class="filter-buttons">
                <button onclick="loadOrders('all')" class="btn-filter active">All</button>
                <button onclick="loadOrders('pending')" class="btn-filter">⏳ Pending</button>
                <button onclick="loadOrders('preparing')" class="btn-filter">🔪 Preparing</button>
                <button onclick="loadOrders('ready')" class="btn-filter">✅ Ready</button>
                <button onclick="loadOrders('served')" class="btn-filter">🍽️ Served</button>
            </div>
        </div>
        <div id="orders-container"></div>
    </div>
    <footer>
        <p>© 2024 King Weliyano Restaurant. All rights reserved.</p>
    </footer>
    <script>
        async function loadOrders(status = 'all') {
            const url = status === 'all' ? '/api/orders' : `/api/orders?status=${status}`;
            try {
                const response = await fetch(url);
                const orders = await response.json();
                displayOrders(orders);
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }
        function displayOrders(orders) {
            const container = document.getElementById('orders-container');
            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-state">No orders found</div>';
                return;
            }
            container.innerHTML = orders.map(order => `
                <div class="order-card status-${order.status}">
                    <div class="order-header">
                        <div>
                            <strong>Order #${order.id}</strong>
                            <span class="status-badge ${order.status}">${order.status}</span>
                        </div>
                        <span>${new Date(order.timestamp).toLocaleString()}</span>
                    </div>
                    <div class="order-body">
                        <p><strong>Customer:</strong> ${order.customerName}</p>
                        <p><strong>Phone:</strong> ${order.phone}</p>
                        <p><strong>Table:</strong> ${order.tableNumber || 'N/A'}</p>
                        <p><strong>Items:</strong></p>
                        <ul>
                            ${order.items.map(item => `
                                <li>${item.image || '🍽️'} ${item.name} x${item.quantity} - $${(item.price * item.quantity).toFixed(2)}</li>
                            `).join('')}
                        </ul>
                        <p><strong>Special Instructions:</strong> ${order.specialInstructions || 'None'}</p>
                        <p class="order-total"><strong>Total: $${order.total.toFixed(2)}</strong></p>
                    </div>
                    <div class="order-actions">
                        ${order.status === 'ready' ? `<button onclick="updateOrder(${order.id}, 'served')" class="btn-served">🍽️ Mark as Served</button>` : ''}
                        ${order.status === 'pending' ? `<button onclick="updateOrder(${order.id}, 'preparing')" class="btn-prepare">🔪 Start Preparing</button>` : ''}
                        ${order.status === 'preparing' ? `<button onclick="updateOrder(${order.id}, 'ready')" class="btn-ready">✅ Mark as Ready</button>` : ''}
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`.btn-filter[onclick*="${status}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }
        async function updateOrder(id, status) {
            try {
                await fetch(`/api/orders/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                loadOrders('all');
            } catch (error) {
                console.error('Error updating order:', error);
            }
        }
        setInterval(() => loadOrders('all'), 10000);
        loadOrders('all');
    </script>
</body>
</html>
