<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Admin Dashboard - King Weliyano</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .notif-bell {
            position: relative;
            display: inline-block;
            cursor: pointer;
            font-size: 1.5rem;
            margin-right: 15px;
        }
        .notif-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .notif-dropdown {
            display: none;
            position: fixed;
            right: 20px;
            top: 80px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            width: 350px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            padding: 10px;
        }
        .notif-dropdown.show { display: block; }
        .notif-item { padding: 10px; border-bottom: 1px solid #ecf0f1; }
        .notif-item.unread { background: #fdf2f2; }
        .notif-item .time { font-size: 0.7rem; color: #7f8c8d; }
        .btn-receipt {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.3s;
        }
        .btn-receipt:hover { background: #1a252f; }
        .waiter-badge {
            background: #27ae60;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .notif-dropdown { width: 300px; right: 10px; top: 120px; }
        }
        @media (max-width: 480px) {
            .notif-dropdown { width: 280px; right: 5px; top: 110px; }
        }
    </style>
</head>
<body>

    <script>
        // ============================================================
        // AUTH CHECK
        // ============================================================
        const token = localStorage.getItem('authToken');
        if (!token) window.location.href = 'login.html';

        async function verifyAuth() {
            try {
                const res = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const result = await res.json();
                if (!result.success) {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                }
            } catch (e) {
                window.location.href = 'login.html';
            }
        }
        verifyAuth();

        function logout() {
            const token = localStorage.getItem('authToken');
            if (token) {
                fetch('/api/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
            }
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.role !== 'admin') {
            alert('Access denied. Admin only.');
            window.location.href = 'login.html';
        }

        // ============================================================
        // PRINT RECEIPT WITH WAITER NAME
        // ============================================================
        async function printReceipt(orderId) {
            try {
                const res = await fetch(`/api/orders/${orderId}`);
                const order = await res.json();

                if (!order) {
                    alert('Order not found!');
                    return;
                }

                const receiptHTML = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Receipt #${order.id}</title>
                        <style>
                            body { font-family: 'Courier New', monospace; padding: 20px; max-width: 400px; margin: 0 auto; background: white; }
                            .receipt { border: 2px dashed #333; padding: 20px; }
                            .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
                            .header h1 { margin: 0; font-size: 1.5rem; color: #c0392b; }
                            .header p { margin: 5px 0; font-size: 0.9rem; color: #555; }
                            .order-info { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 5px; }
                            .items { width: 100%; margin: 10px 0; }
                            .items th { text-align: left; border-bottom: 1px solid #ddd; padding: 5px 0; }
                            .items td { padding: 5px 0; border-bottom: 1px solid #eee; }
                            .total { font-size: 1.2rem; font-weight: bold; text-align: right; border-top: 2px solid #333; padding-top: 10px; margin-top: 10px; }
                            .payment { text-align: center; margin: 10px 0; padding: 5px; background: #e8f8f0; border-radius: 5px; }
                            .served-by { text-align: center; margin: 10px 0; padding: 8px; background: #d4edda; border-radius: 5px; font-weight: bold; font-size: 1rem; border: 1px solid #27ae60; }
                            .served-by .waiter-icon { font-size: 1.2rem; }
                            .footer { text-align: center; margin-top: 20px; padding-top: 10px; border-top: 2px dashed #333; font-size: 0.8rem; color: #777; }
                            .thank-you { text-align: center; font-size: 1.2rem; font-weight: bold; color: #27ae60; margin: 10px 0; }
                            @media print { body { padding: 0; } .receipt { border: none; } .no-print { display: none; } }
                        </style>
                    </head>
                    <body>
                        <div class="receipt">
                            <div class="header">
                                <h1>🍽️ King Weliyano</h1>
                                <p>Restaurant</p>
                                <p>📍 Nairobi, Kenya</p>
                                <p>📞 +254 700 000 000</p>
                            </div>
                            <div class="order-info">
                                <p><strong>Order #:</strong> ${order.id}</p>
                                <p><strong>Date:</strong> ${new Date(order.timestamp).toLocaleString()}</p>
                                <p><strong>Table:</strong> ${order.tableNumber || 'N/A'}</p>
                                <p><strong>Customer:</strong> ${order.customerName}</p>
                                <p><strong>Phone:</strong> ${order.phone}</p>
                            </div>
                            <table class="items">
                                <tr><th>Item</th><th>Qty</th><th style="text-align:right;">Price</th></tr>
                                ${order.items.map(item => `
                                    <tr><td>${item.image || '🍽️'} ${item.name}</td><td>${item.quantity}</td><td style="text-align:right;">$${(item.price * item.quantity).toFixed(2)}</td></tr>
                                `).join('')}
                            </table>
                            <div class="total">Total: $${order.total.toFixed(2)}</div>
                            <div class="payment">💳 Payment: <strong>${order.paymentMethod || 'cash'}</strong></div>
                            <div class="served-by">
                                <span class="waiter-icon">👨‍🍳</span> Served by: <strong>${order.servedBy || 'Not yet served'}</strong>
                                ${order.servedAt ? ` at ${new Date(order.servedAt).toLocaleString()}` : ''}
                            </div>
                            ${order.specialInstructions ? `<div style="margin:10px 0;padding:10px;background:#fff3cd;border-radius:5px;"><strong>📌 Special Instructions:</strong><p style="margin:5px 0;">${order.specialInstructions}</p></div>` : ''}
                            <div class="thank-you">🙏 Thank You!</div>
                            <div class="footer"><p>🎉 Enjoy your meal!</p><p>Please come again!</p></div>
                        </div>
                        <div style="text-align:center;margin-top:20px;" class="no-print">
                            <button onclick="window.print()" style="background:#c0392b;color:white;border:none;padding:12px 30px;border-radius:25px;cursor:pointer;font-size:1rem;">🖨️ Print</button>
                            <button onclick="window.close()" style="background:#7f8c8d;color:white;border:none;padding:12px 30px;border-radius:25px;cursor:pointer;font-size:1rem;margin-left:10px;">✕ Close</button>
                        </div>
                    </body>
                    </html>
                `;

                const receiptWindow = window.open('', '_blank', 'width=450,height=600');
                receiptWindow.document.write(receiptHTML);
                receiptWindow.document.close();

            } catch (error) {
                console.error('Error generating receipt:', error);
                alert('Error generating receipt. Please try again.');
            }
        }
    </script>

    <header>
        <div class="header-content">
            <h1>👑 King Weliyano - Admin Dashboard</h1>
            <nav>
                <a href="index.html">🏠 Home</a>
                <a href="waiter.html">👨‍🍳 Waiter</a>
                <a href="chef.html">👨‍🍳 Chef</a>
                <a href="admin.html">👑 Admin</a>
                <span class="notif-bell" onclick="toggleAdminNotif()">
                    🔔
                    <span class="notif-badge" id="adminNotifCount">0</span>
                </span>
                <a href="#" onclick="logout()">🚪 Logout</a>
            </nav>
        </div>
    </header>

    <div class="container">

        <!-- Notification Dropdown -->
        <div class="notif-dropdown" id="adminNotifDropdown">
            <div id="adminNotifList"></div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card"><div class="number" id="total-orders">0</div><div class="label">Total Orders</div></div>
            <div class="stat-card"><div class="number" id="pending-orders">0</div><div class="label">⏳ Pending</div></div>
            <div class="stat-card"><div class="number" id="preparing-orders">0</div><div class="label">🔪 Preparing</div></div>
            <div class="stat-card"><div class="number" id="ready-orders">0</div><div class="label">✅ Ready</div></div>
            <div class="stat-card"><div class="number" id="served-orders">0</div><div class="label">🍽️ Served</div></div>
            <div class="stat-card revenue"><div class="number" id="total-revenue">$0</div><div class="label">💰 Revenue</div></div>
        </div>

        <!-- Menu Management -->
        <div class="menu-management">
            <h3>📝 Manage Menu</h3>
            <div class="form-row">
                <input type="text" id="item-name" placeholder="Item Name">
                <input type="number" id="item-price" placeholder="Price" step="0.01">
                <input type="text" id="item-category" placeholder="Category">
                <input type="text" id="item-image" placeholder="Emoji (e.g. 🍔)">
                <button onclick="addMenuItem()" class="btn-add-item">➕ Add Item</button>
            </div>
            <div id="menu-items-list" class="menu-items-list"></div>
        </div>

        <!-- Waiter Management - Admin Only -->
        <div class="waiter-management">
            <h3>👨‍🍳 Manage Waiters</h3>
            <div class="form-row">
                <input type="text" id="waiter-username" placeholder="New Waiter Username">
                <input type="text" id="waiter-password" placeholder="New Waiter Password">
                <button onclick="addWaiter()" class="btn-add-item">➕ Add Waiter</button>
            </div>
            <div id="waiter-list" class="waiter-list"></div>
        </div>

        <!-- All Orders -->
        <div style="margin-top: 30px;">
            <h3>📋 All Orders</h3>
            <div id="orders-container"></div>
        </div>
    </div>

    <footer>
        <p>© 2024 King Weliyano Restaurant. All rights reserved.</p>
    </footer>

    <script>
        // ============================================================
        // ADMIN NOTIFICATIONS
        // ============================================================
        let adminNotifications = [];

        async function loadAdminNotifications() {
            try {
                const res = await fetch('/api/notifications?role=all');
                adminNotifications = await res.json();
                updateAdminNotifUI();
            } catch (e) { console.error('Notif error:', e); }
        }

        function updateAdminNotifUI() {
            const unread = adminNotifications.filter(n => !n.read).length;
            document.getElementById('adminNotifCount').textContent = unread;
            const list = document.getElementById('adminNotifList');
            if (adminNotifications.length === 0) {
                list.innerHTML = '<p style="color:#7f8c8d;text-align:center;padding:10px;">No notifications</p>';
                return;
            }
            list.innerHTML = adminNotifications.map(n => `
                <div class="notif-item ${n.read ? '' : 'unread'}">
                    <p style="margin:0;font-size:0.9rem;">${n.message}</p>
                    <span class="time">${new Date(n.timestamp).toLocaleString()}</span>
                </div>
            `).join('');
        }

        function toggleAdminNotif() {
            const dd = document.getElementById('adminNotifDropdown');
            dd.classList.toggle('show');
            if (dd.classList.contains('show')) loadAdminNotifications();
        }

        document.addEventListener('click', function(e) {
            const dd = document.getElementById('adminNotifDropdown');
            const bell = document.querySelector('.notif-bell');
            if (bell && !bell.contains(e.target) && !dd.contains(e.target)) {
                dd.classList.remove('show');
            }
        });

        // ============================================================
        // STATS
        // ============================================================
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById('total-orders').textContent = stats.totalOrders;
                document.getElementById('pending-orders').textContent = stats.pendingOrders;
                document.getElementById('preparing-orders').textContent = stats.preparingOrders;
                document.getElementById('ready-orders').textContent = stats.readyOrders;
                document.getElementById('served-orders').textContent = stats.servedOrders;
                document.getElementById('total-revenue').textContent = `$${stats.totalRevenue.toFixed(2)}`;
            } catch (e) { console.error('Error loading stats:', e); }
        }

        // ============================================================
        // MENU MANAGEMENT
        // ============================================================
        async function loadMenuItems() {
            try {
                const res = await fetch('/api/menu');
                const menu = await res.json();
                const container = document.getElementById('menu-items-list');
                if (menu.length === 0) {
                    container.innerHTML = '<p style="color:#7f8c8d;">No menu items yet. Add one above!</p>';
                    return;
                }
                container.innerHTML = menu.map(item => `
                    <div class="menu-item-card">
                        <div class="item-info">
                            <span class="item-name">${item.image || '🍽️'} ${item.name}</span>
                            <span class="item-price">$${item.price.toFixed(2)} - ${item.category}</span>
                        </div>
                        <button onclick="deleteMenuItem(${item.id})" class="btn-delete-item">✕</button>
                    </div>
                `).join('');
            } catch (e) { console.error('Error loading menu:', e); }
        }

        async function addMenuItem() {
            const name = document.getElementById('item-name').value.trim();
            const price = document.getElementById('item-price').value;
            const category = document.getElementById('item-category').value.trim();
            const image = document.getElementById('item-image').value.trim() || '🍽️';
            if (!name || !price) {
                alert('Please enter name and price!');
                return;
            }
            try {
                await fetch('/api/menu', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price: parseFloat(price), category, image })
                });
                document.getElementById('item-name').value = '';
                document.getElementById('item-price').value = '';
                document.getElementById('item-category').value = '';
                document.getElementById('item-image').value = '';
                loadMenuItems();
                loadStats();
            } catch (e) {
                console.error('Error adding item:', e);
                alert('Error adding item. Please try again.');
            }
        }

        async function deleteMenuItem(id) {
            if (!confirm('Delete this item?')) return;
            try {
                await fetch(`/api/menu/${id}`, { method: 'DELETE' });
                loadMenuItems();
                loadStats();
            } catch (e) {
                console.error('Error deleting item:', e);
                alert('Error deleting item. Please try again.');
            }
        }

        // ============================================================
        // WAITER MANAGEMENT - ADMIN ONLY
        // ============================================================
        async function loadWaiters() {
            try {
                const token = localStorage.getItem('authToken');
                const res = await fetch('/api/users', {
                    headers: { 'Authorization': token }
                });
                if (!res.ok) throw new Error('Failed to load waiters');
                const users = await res.json();
                displayWaiters(users);
            } catch (error) {
                console.error('Error loading waiters:', error);
                document.getElementById('waiter-list').innerHTML = 
                    '<p style="color:#e74c3c;">Error loading waiters. Please refresh.</p>';
            }
        }

        function displayWaiters(users) {
            const container = document.getElementById('waiter-list');
            const waiters = users.filter(u => u.role === 'waiter');
            if (waiters.length === 0) {
                container.innerHTML = '<p style="color:#7f8c8d;">No waiters added yet.</p>';
                return;
            }
            container.innerHTML = waiters.map(w => `
                <div class="waiter-card">
                    <div class="waiter-info">
                        <span class="waiter-name">👨‍🍳 ${w.username}</span>
                        <span class="waiter-role">Waiter</span>
                    </div>
                    <div class="waiter-actions">
                        <button onclick="resetWaiterPassword(${w.id})" class="btn-reset-password">🔑 Reset</button>
                        <button onclick="deleteWaiter(${w.id})" class="btn-delete-waiter">✕</button>
                    </div>
                </div>
            `).join('');
        }

        async function addWaiter() {
            const username = document.getElementById('waiter-username').value.trim();
            const password = document.getElementById('waiter-password').value.trim();
            if (!username || !password) {
                alert('Please enter both username and password');
                return;
            }
            if (password.length < 4) {
                alert('Password must be at least 4 characters');
                return;
            }
            try {
                const token = localStorage.getItem('authToken');
                const res = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': token 
                    },
                    body: JSON.stringify({ username, password })
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('waiter-username').value = '';
                    document.getElementById('waiter-password').value = '';
                    loadWaiters();
                    alert(`✅ Waiter "${username}" added successfully!`);
                } else {
                    alert('❌ Error: ' + result.error);
                }
            } catch (error) {
                console.error('Error adding waiter:', error);
                alert('Error adding waiter. Please try again.');
            }
        }

        async function deleteWaiter(id) {
            if (!confirm('Delete this waiter?')) return;
            try {
                const token = localStorage.getItem('authToken');
                const res = await fetch(`/api/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': token }
                });
                const result = await res.json();
                if (result.success) {
                    loadWaiters();
                    alert('✅ Waiter deleted successfully');
                } else {
                    alert('❌ Error: ' + result.error);
                }
            } catch (error) {
                console.error('Error deleting waiter:', error);
                alert('Error deleting waiter. Please try again.');
            }
        }

        async function resetWaiterPassword(id) {
            const newPassword = prompt('Enter new password (min 4 characters):');
            if (!newPassword) return;
            if (newPassword.length < 4) {
                alert('Password must be at least 4 characters');
                return;
            }
            try {
                const token = localStorage.getItem('authToken');
                const res = await fetch(`/api/users/${id}/reset-password`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': token 
                    },
                    body: JSON.stringify({ newPassword })
                });
                const result = await res.json();
                if (result.success) {
                    alert('✅ Password reset successfully');
                    loadWaiters();
                } else {
                    alert('❌ Error: ' + result.error);
                }
            } catch (error) {
                console.error('Error resetting password:', error);
                alert('Error resetting password. Please try again.');
            }
        }

        // ============================================================
        // ALL ORDERS
        // ============================================================
        async function loadAllOrders() {
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                const container = document.getElementById('orders-container');
                if (orders.length === 0) {
                    container.innerHTML = '<div class="empty-state">No orders yet</div>';
                    return;
                }
                container.innerHTML = orders.map(order => `
                    <div class="order-card status-${order.status}">
                        <div class="order-header">
                            <div>
                                <strong>Order #${order.id}</strong>
                                <span class="status-badge ${order.status}">${order.status}</span>
                                ${order.servedBy ? `<span class="waiter-badge">👨‍🍳 ${order.servedBy}</span>` : ''}
                            </div>
                            <span>${new Date(order.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="order-body">
                            <p><strong>👤 Customer:</strong> ${order.customerName}</p>
                            <p><strong>📞 Phone:</strong> ${order.phone}</p>
                            <p><strong>🪑 Table:</strong> ${order.tableNumber || 'N/A'}</p>
                            <p><strong>💳 Payment:</strong> ${order.paymentMethod || 'cash'}</p>
                            ${order.servedBy ? `<p><strong>👨‍🍳 Served by:</strong> ${order.servedBy}</p>` : ''}
                            <ul>
                                ${order.items.map(item => `
                                    <li>${item.image || '🍽️'} ${item.name} x${item.quantity} - $${(item.price * item.quantity).toFixed(2)}</li>
                                `).join('')}
                            </ul>
                            ${order.specialInstructions ? `<p><strong>📌 Instructions:</strong> ${order.specialInstructions}</p>` : ''}
                            <p class="order-total"><strong>Total: $${order.total.toFixed(2)}</strong></p>
                        </div>
                        <div class="order-actions">
                            <button onclick="printReceipt(${order.id})" class="btn-receipt">🧾 Receipt</button>
                            <button onclick="deleteOrder(${order.id})" class="btn-delete">🗑️ Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error('Error loading orders:', e); }
        }

        async function deleteOrder(id) {
            if (!confirm(`Delete order #${id}?`)) return;
            try {
                await fetch(`/api/orders/${id}`, { method: 'DELETE' });
                loadAllOrders();
                loadStats();
            } catch (e) {
                console.error('Error deleting order:', e);
                alert('Error deleting order. Please try again.');
            }
        }

        // ============================================================
        // AUTO-REFRESH
        // ============================================================
        setInterval(() => {
            loadStats();
            loadAllOrders();
            loadAdminNotifications();
        }, 10000);

        // ============================================================
        // INIT
        // ============================================================
        loadStats();
        loadMenuItems();
        loadAllOrders();
        loadAdminNotifications();
        loadWaiters();
    </script>
</body>
</html>
