cat > login.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Login - King Weliyano</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fdf6ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .logo { text-align: center; font-size: 4rem; margin-bottom: 10px; }
        h1 { text-align: center; color: #c0392b; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-size: 0.9rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #2c3e50; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #c0392b; outline: none; }
        button {
            width: 100%;
            padding: 14px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #e74c3c; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        .message.error {
            background: #fde8e8;
            color: #c0392b;
            display: block;
            border: 1px solid #f5c6c6;
        }
        .message.success {
            background: #e8f8f0;
            color: #27ae60;
            display: block;
            border: 1px solid #a9dfbf;
        }
        .links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
        }
        .links a {
            color: #c0392b;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9rem;
        }
        .links a:hover { text-decoration: underline; }
        .demo-credentials {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 0.85rem;
            border: 1px solid #e9ecef;
        }
        .demo-credentials p { margin: 3px 0; color: #495057; }
        .demo-credentials strong { color: #2c3e50; }
        .role-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .role-badge.admin { background: #c0392b; color: white; }
        .role-badge.waiter { background: #3498db; color: white; }
        .role-badge.chef { background: #e67e22; color: white; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🍽️</div>
        <h1>King Weliyano</h1>
        <p class="subtitle">Staff Login</p>
        
        <div id="message" class="message"></div>
        
        <div class="form-group">
            <label for="username">👤 Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
        </div>
        
        <div class="form-group">
            <label for="password">🔒 Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
        
        <button id="loginBtn" onclick="login()">🔐 Login</button>
        
        <div class="demo-credentials">
            <p style="font-weight:600;margin-bottom:5px;">📋 Demo Credentials:</p>
            <p><strong>Admin:</strong> admin / admin123 <span class="role-badge admin">Admin</span></p>
            <p><strong>Waiter:</strong> waiter / waiter123 <span class="role-badge waiter">Waiter</span></p>
            <p><strong>Chef:</strong> chef / chef123 <span class="role-badge chef">Chef</span></p>
        </div>
        
        <div class="links">
            <a href="index.html">🏠 Home</a>
            <a href="waiter.html">👨‍🍳 Waiter</a>
            <a href="chef.html">👨‍🍳 Chef</a>
            <a href="admin.html">👑 Admin</a>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('authToken');
        if (token) {
            verifySession(token);
        }

        async function verifySession(token) {
            try {
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const result = await response.json();
                if (result.success) {
                    redirectToDashboard(result.user.role);
                } else {
                    localStorage.removeItem('authToken');
                }
            } catch (error) {
                localStorage.removeItem('authToken');
            }
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const messageDiv = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');
            
            messageDiv.className = 'message';
            messageDiv.textContent = '';
            
            if (!username || !password) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '⚠️ Please enter both username and password';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('authToken', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    messageDiv.className = 'message success';
                    messageDiv.textContent = `✅ Welcome ${result.user.name}! Redirecting...`;
                    
                    setTimeout(() => {
                        redirectToDashboard(result.user.role);
                    }, 1500);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ ' + (result.error || 'Invalid username or password');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '🔐 Login';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Error connecting to server. Please try again.';
                loginBtn.disabled = false;
                loginBtn.innerHTML = '🔐 Login';
            }
        }

        function redirectToDashboard(role) {
            const dashboards = {
                'admin': 'admin.html',
                'waiter': 'waiter.html',
                'chef': 'chef.html'
            };
            window.location.href = dashboards[role] || 'index.html';
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        document.getElementById('username').focus();
    </script>
</body>
</html>
EOF
