<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KING WELIYANO RESTAURANT - Customer Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:gold;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.banner{
height:300px;
background:url("images/background/restaurant.jpg") center/cover;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:45px;
font-weight:bold;
text-shadow:2px 2px 5px black;
}

.container{
width:90%;
margin:auto;
padding:30px 0;
}

.section-title{
font-size:30px;
margin-bottom:20px;
color:#333;
}

.food-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.food-card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.food-card img{
width:100%;
height:200px;
object-fit:cover;
}

.food-card h3{
padding:10px;
}

.food-card p{
padding:0 10px;
}

.food-card button{
width:100%;
padding:15px;
background:green;
color:white;
border:none;
cursor:pointer;
font-size:18px;
}

.food-card button:hover{
background:darkgreen;
}

.orders{
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

table th,table td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

footer{
margin-top:40px;
background:#111;
color:white;
padding:20px;
text-align:center;
}
</style>

</head>

<body>

<header>

<div class="logo">
KING WELIYANO RESTAURANT
</div>

<nav>

<a href="#">Home</a>

<a href="#">Menu</a>

<a href="#">My Orders</a>

<a href="#">Profile</a>

<a href="login.html">Logout</a>

</nav>

</header>

<div class="banner">

WELCOME CUSTOMER

</div>

<div class="container">

<h2 class="section-title">

Popular Foods

</h2>

<div id="foods" class="food-grid">

</div>

<div class="orders">

<h2>

My Orders

</h2>

<table>

<tr>

<th>Order ID</th>

<th>Food</th>

<th>Price</th>

<th>Status</th>

</tr>

<tbody id="ordersTable">

<tr>

<td colspan="4">

No Orders Yet

</td>

</tr>

</tbody>

</table>

</div>

</div>

<footer>

© 2026 KING WELIYANO RESTAURANT

</footer>

<script src="js/customer.js"></script>

</body>
</html>
