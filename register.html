<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KING WELIYANO RESTAURANT | Register</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

header h1{
color:gold;
}

.container{

width:450px;
max-width:95%;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);

}

.container h2{

text-align:center;
margin-bottom:25px;

}

label{

display:block;
margin-top:15px;
font-weight:bold;

}

input{

width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;

}

button{

width:100%;
padding:15px;
margin-top:25px;
background:green;
color:white;
border:none;
cursor:pointer;
font-size:18px;
border-radius:5px;

}

button:hover{

background:#006400;

}

.links{

text-align:center;
margin-top:20px;

}

.links a{

text-decoration:none;
color:green;
font-weight:bold;

}

footer{

margin-top:40px;
background:#111;
color:white;
padding:20px;
text-align:center;

}

</style>

</head>

<body>

<header>

<h1>👑 KING WELIYANO RESTAURANT</h1>

<p>Create Your Customer Account</p>

</header>

<div class="container">

<h2>Customer Registration</h2>

<form id="registerForm">

<label>First Name</label>
<input type="text" id="firstName" required>

<label>Last Name</label>
<input type="text" id="lastName" required>

<label>Email Address</label>
<input type="email" id="email" required>

<label>Phone Number</label>
<input type="text" id="phone" required>

<label>Password</label>
<input type="password" id="password" required>

<label>Confirm Password</label>
<input type="password" id="confirmPassword" required>

<button type="submit">

Register

</button>

</form>

<div class="links">

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

<br>

<a href="index.html">

⬅ Back Home

</a>

</div>

</div>

<footer>

© 2026 KING WELIYANO RESTAURANT

</footer>

<script src="js/register.js"></script>

</body>

</html>
