<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
font-size:30px;
}

.container{
width:90%;
margin:auto;
padding:30px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

th{
background:green;
color:white;
padding:15px;
}

td{
padding:15px;
text-align:center;
border:1px solid #ddd;
}

button{

padding:10px 18px;

border:none;

color:white;

cursor:pointer;

font-weight:bold;

}

.prepare{

background:orange;

}

.ready{

background:green;

}

</style>

</head>

<body>

<header>

👨‍🍳 KING WELIYANO RESTAURANT CHEF DASHBOARD

</header>

<div class="container">

<h2>Customer Orders</h2>

<table>

<thead>

<tr>

<th>ID</th>

<th>Food</th>

<th>Price</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="chefOrders">

</tbody>

</table>

</div>

<script src="js/chef.js"></script>

</body>

</html>
